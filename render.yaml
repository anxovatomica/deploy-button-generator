services:
  - type: web
    name: deploy-button-generator
    runtime: docker
    repo: https://github.com/anxovatomica/deploy-button-generator
    branch: main
    plan: free
    envVars:
      - key: PORT
        value: 8000
    healthCheckPath: /
    autoDeploy: true
    # Render Blueprint — auto-generate Dockerfile + deploy badge for any GitHub repo
    # Features: Stack detection, Dockerfile generation, render.yaml generation, one-click deploy
    # Tech: Python, FastAPI, Docker, GitHub API